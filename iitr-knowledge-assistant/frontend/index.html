<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="IIT Roorkee PhD Knowledge Assistant">
  <title>Sutra - IITR PhD Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <button id="bubbleBtn" class="bubble-btn" aria-label="Open Chat Assistant">
    <svg viewBox="0 0 44 44" width="26" height="26" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="22" cy="9"  rx="2.6" ry="6.5" fill="#fff" opacity="0.9" transform="rotate(0,22,22)"/>
      <ellipse cx="22" cy="9"  rx="2.6" ry="6.5" fill="#fff" opacity="0.9" transform="rotate(40,22,22)"/>
      <ellipse cx="22" cy="9"  rx="2.6" ry="6.5" fill="#fff" opacity="0.9" transform="rotate(80,22,22)"/>
      <ellipse cx="22" cy="9"  rx="2.6" ry="6.5" fill="#fff" opacity="0.9" transform="rotate(120,22,22)"/>
      <ellipse cx="22" cy="9"  rx="2.6" ry="6.5" fill="#fff" opacity="0.9" transform="rotate(160,22,22)"/>
      <ellipse cx="22" cy="9"  rx="2.6" ry="6.5" fill="#fff" opacity="0.9" transform="rotate(200,22,22)"/>
      <ellipse cx="22" cy="9"  rx="2.6" ry="6.5" fill="#fff" opacity="0.9" transform="rotate(240,22,22)"/>
      <ellipse cx="22" cy="9"  rx="2.6" ry="6.5" fill="#fff" opacity="0.9" transform="rotate(280,22,22)"/>
      <ellipse cx="22" cy="9"  rx="2.6" ry="6.5" fill="#fff" opacity="0.9" transform="rotate(320,22,22)"/>
      <ellipse cx="22" cy="12" rx="1.6" ry="5" fill="#e8b84b" transform="rotate(0,22,22)"/>
      <ellipse cx="22" cy="12" rx="1.6" ry="5" fill="#e8b84b" transform="rotate(60,22,22)"/>
      <ellipse cx="22" cy="12" rx="1.6" ry="5" fill="#e8b84b" transform="rotate(120,22,22)"/>
      <ellipse cx="22" cy="12" rx="1.6" ry="5" fill="#e8b84b" transform="rotate(180,22,22)"/>
      <ellipse cx="22" cy="12" rx="1.6" ry="5" fill="#e8b84b" transform="rotate(240,22,22)"/>
      <ellipse cx="22" cy="12" rx="1.6" ry="5" fill="#e8b84b" transform="rotate(300,22,22)"/>
      <circle cx="22" cy="22" r="4" fill="#fff"/>
      <circle cx="22" cy="22" r="2.2" fill="#e8b84b"/>
      <path d="M14 31 Q22 28 30 31 L30 37 Q22 34 22 34 Q22 34 14 37 Z" fill="none" stroke="#fff" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="22" y1="31" x2="22" y2="37" stroke="#fff" stroke-width="0.7" stroke-linecap="round"/>
    </svg>
    <span class="bubble-label">Ask anything</span>
  </button>

  <div class="app hidden" id="appWindow">

    <header class="header">
      <div class="header-brand">
        <svg class="header-emblem" aria-label="IIT Roorkee emblem" viewBox="0 0 44 44" width="38" height="38" xmlns="http://www.w3.org/2000/svg">
          <!-- Outer ring -->
          <circle cx="22" cy="22" r="20" fill="none" stroke="#C8961E" stroke-width="0.8" opacity="0.5"/>
          <circle cx="22" cy="22" r="17.5" fill="none" stroke="#C8961E" stroke-width="0.4" opacity="0.3"/>
          <!-- Outer lotus petals (9) -->
          <ellipse cx="22" cy="9"  rx="2.6" ry="6.5" fill="#C8961E" opacity="0.9" transform="rotate(0,22,22)"/>
          <ellipse cx="22" cy="9"  rx="2.6" ry="6.5" fill="#C8961E" opacity="0.9" transform="rotate(40,22,22)"/>
          <ellipse cx="22" cy="9"  rx="2.6" ry="6.5" fill="#C8961E" opacity="0.9" transform="rotate(80,22,22)"/>
          <ellipse cx="22" cy="9"  rx="2.6" ry="6.5" fill="#C8961E" opacity="0.9" transform="rotate(120,22,22)"/>
          <ellipse cx="22" cy="9"  rx="2.6" ry="6.5" fill="#C8961E" opacity="0.9" transform="rotate(160,22,22)"/>
          <ellipse cx="22" cy="9"  rx="2.6" ry="6.5" fill="#C8961E" opacity="0.9" transform="rotate(200,22,22)"/>
          <ellipse cx="22" cy="9"  rx="2.6" ry="6.5" fill="#C8961E" opacity="0.9" transform="rotate(240,22,22)"/>
          <ellipse cx="22" cy="9"  rx="2.6" ry="6.5" fill="#C8961E" opacity="0.9" transform="rotate(280,22,22)"/>
          <ellipse cx="22" cy="9"  rx="2.6" ry="6.5" fill="#C8961E" opacity="0.9" transform="rotate(320,22,22)"/>
          <!-- Inner lotus petals (6) -->
          <ellipse cx="22" cy="12" rx="1.6" ry="5" fill="#e8b84b" transform="rotate(0,22,22)"/>
          <ellipse cx="22" cy="12" rx="1.6" ry="5" fill="#e8b84b" transform="rotate(60,22,22)"/>
          <ellipse cx="22" cy="12" rx="1.6" ry="5" fill="#e8b84b" transform="rotate(120,22,22)"/>
          <ellipse cx="22" cy="12" rx="1.6" ry="5" fill="#e8b84b" transform="rotate(180,22,22)"/>
          <ellipse cx="22" cy="12" rx="1.6" ry="5" fill="#e8b84b" transform="rotate(240,22,22)"/>
          <ellipse cx="22" cy="12" rx="1.6" ry="5" fill="#e8b84b" transform="rotate(300,22,22)"/>
          <!-- Lotus centre -->
          <circle cx="22" cy="22" r="4" fill="#C8961E"/>
          <circle cx="22" cy="22" r="2.2" fill="#e8b84b"/>
          <!-- Open book -->
          <path d="M14 31 Q22 28 30 31" fill="none" stroke="#C8961E" stroke-width="1" stroke-linecap="round"/>
          <path d="M14 31 L14 37 Q22 34 22 34 Q22 34 30 37 L30 31" fill="none" stroke="#C8961E" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="22" y1="31" x2="22" y2="37" stroke="#C8961E" stroke-width="0.7" stroke-linecap="round"/>
          <!-- Arc text top: IIT ROORKEE -->
          <path id="hdr-top" d="M 3,22 a 19,19 0 0,1 38,0" fill="none"/>
          <text font-size="3.8" font-family="'Outfit',sans-serif" font-weight="600" fill="#e8b84b" letter-spacing="1.2">
            <textPath href="#hdr-top" startOffset="9%">IIT ROORKEE</textPath>
          </text>
          <!-- Arc text bottom: motto -->
          <path id="hdr-bot" d="M 3,24 a 19,19 0 0,0 38,0" fill="none"/>
          <text font-size="3" font-family="'Outfit',sans-serif" fill="#C8961E" letter-spacing="0.5" opacity="0.85">
            <textPath href="#hdr-bot" startOffset="5%">Tamaso Ma Jyotirgamaya</textPath>
          </text>
        </svg>
        <div class="header-text">
          <span class="header-inst">IIT Roorkee</span>
          <span class="header-sub">PhD Knowledge Assistant</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="clearBtn" title="New conversation" aria-label="New conversation">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
        </button>
        <button class="icon-btn close-btn" id="closeBtn" title="Close" aria-label="Close chat">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="chat" id="chatArea">
      <div class="welcome-container" id="welcomeMessage">
        <div class="welcome-hero">
          <div class="welcome-icon" aria-hidden="true">
            <svg viewBox="0 0 60 60" width="56" height="56" xmlns="http://www.w3.org/2000/svg">
              <circle cx="30" cy="30" r="29" fill="rgba(200,150,30,0.08)" stroke="#C8961E" stroke-width="0.8" opacity="0.6"/>
              <circle cx="30" cy="30" r="24" fill="none" stroke="#C8961E" stroke-width="0.4" opacity="0.3"/>
              <!-- Outer petals -->
              <ellipse cx="30" cy="11" rx="3.2" ry="8.5" fill="#C8961E" opacity="0.85" transform="rotate(0,30,30)"/>
              <ellipse cx="30" cy="11" rx="3.2" ry="8.5" fill="#C8961E" opacity="0.85" transform="rotate(40,30,30)"/>
              <ellipse cx="30" cy="11" rx="3.2" ry="8.5" fill="#C8961E" opacity="0.85" transform="rotate(80,30,30)"/>
              <ellipse cx="30" cy="11" rx="3.2" ry="8.5" fill="#C8961E" opacity="0.85" transform="rotate(120,30,30)"/>
              <ellipse cx="30" cy="11" rx="3.2" ry="8.5" fill="#C8961E" opacity="0.85" transform="rotate(160,30,30)"/>
              <ellipse cx="30" cy="11" rx="3.2" ry="8.5" fill="#C8961E" opacity="0.85" transform="rotate(200,30,30)"/>
              <ellipse cx="30" cy="11" rx="3.2" ry="8.5" fill="#C8961E" opacity="0.85" transform="rotate(240,30,30)"/>
              <ellipse cx="30" cy="11" rx="3.2" ry="8.5" fill="#C8961E" opacity="0.85" transform="rotate(280,30,30)"/>
              <ellipse cx="30" cy="11" rx="3.2" ry="8.5" fill="#C8961E" opacity="0.85" transform="rotate(320,30,30)"/>
              <!-- Inner petals -->
              <ellipse cx="30" cy="15" rx="2" ry="6.5" fill="#e8b84b" transform="rotate(0,30,30)"/>
              <ellipse cx="30" cy="15" rx="2" ry="6.5" fill="#e8b84b" transform="rotate(60,30,30)"/>
              <ellipse cx="30" cy="15" rx="2" ry="6.5" fill="#e8b84b" transform="rotate(120,30,30)"/>
              <ellipse cx="30" cy="15" rx="2" ry="6.5" fill="#e8b84b" transform="rotate(180,30,30)"/>
              <ellipse cx="30" cy="15" rx="2" ry="6.5" fill="#e8b84b" transform="rotate(240,30,30)"/>
              <ellipse cx="30" cy="15" rx="2" ry="6.5" fill="#e8b84b" transform="rotate(300,30,30)"/>
              <!-- Centre -->
              <circle cx="30" cy="30" r="5.5" fill="#C8961E"/>
              <circle cx="30" cy="30" r="3" fill="#e8b84b"/>
              <!-- Book -->
              <path d="M19 41 Q30 37.5 41 41" fill="none" stroke="#C8961E" stroke-width="1.2" stroke-linecap="round"/>
              <path d="M19 41 L19 49 Q30 45.5 30 45.5 Q30 45.5 41 49 L41 41" fill="none" stroke="#C8961E" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
              <line x1="30" y1="41" x2="30" y2="49" stroke="#C8961E" stroke-width="0.8" stroke-linecap="round"/>
              <!-- Arc top text -->
              <path id="w-top" d="M 4,30 a 26,26 0 0,1 52,0" fill="none"/>
              <text font-size="5" font-family="'Outfit',sans-serif" font-weight="600" fill="#C8961E" letter-spacing="1.5">
                <textPath href="#w-top" startOffset="9%">IIT ROORKEE</textPath>
              </text>
              <!-- Arc bottom text -->
              <path id="w-bot" d="M 4,32 a 26,26 0 0,0 52,0" fill="none"/>
              <text font-size="3.8" font-family="'Outfit',sans-serif" fill="#C8961E" letter-spacing="0.6" opacity="0.75">
                <textPath href="#w-bot" startOffset="6%">Tamaso Ma Jyotirgamaya</textPath>
              </text>
            </svg>
          </div>
          <h2>Know the rules. Navigate with clarity.</h2>
          <p>Ask Sutra anything about IITR PhD regulations — from admission criteria to thesis defence, grounded in the official documents.</p>
        </div>

        <div class="suggestions">
          <p class="suggestions-label">Common questions</p>
          <div class="suggestions-grid">
            <button class="suggestion-card" data-question="What is the maximum duration of a PhD programme?">
              <span class="s-icon" aria-hidden="true">
                <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="10" cy="10" r="8"/><polyline points="10 6 10 10 13 12"/></svg>
              </span>
              <span class="s-text">PhD duration &amp; time limits</span>
            </button>
            <button class="suggestion-card" data-question="Do IIT graduates qualify for GATE exemption with CGPA 7.99?">
              <span class="s-icon" aria-hidden="true">
                <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
              </span>
              <span class="s-text">GATE exemption criteria</span>
            </button>
            <button class="suggestion-card" data-question="What are the requirements to obtain PhD candidacy?">
              <span class="s-icon" aria-hidden="true">
                <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
              </span>
              <span class="s-text">Candidacy requirements</span>
            </button>
            <button class="suggestion-card" data-question="What is the thesis submission process and timeline?">
              <span class="s-icon" aria-hidden="true">
                <svg viewBox="0 0 20 20" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
              </span>
              <span class="s-text">Thesis submission process</span>
            </button>
          </div>
        </div>
      </div>
    </main>

    <div class="input-bar">
      <form id="inputForm" autocomplete="off">
        <input type="text" id="messageInput" placeholder="Ask about PhD regulations…" autocomplete="off" spellcheck="true">
        <button type="submit" id="sendBtn" aria-label="Send message">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </form>
      <p class="input-disclaimer">Sutra responds based on official IITR PhD Regulations</p>
    </div>

  </div>

  <script src="api-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
