version: '3.8'

services:
  assistant:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "45123:45123"
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434/api/chat
      - EMBEDDING_MODEL=BAAI/bge-base-en-v1.5
      - RERANK_MODEL=BAAI/bge-reranker-base
      - OLLAMA_MODEL=qwen2.5:7b-instruct-q4_K_M
      - OLLAMA_NUM_PARALLEL=4
      - DATABASE_URL=postgresql+asyncpg://sutra_admin:sutra_secure_password@postgres:5432/sutra_db
      - API_KEY=${API_KEY}
      - API_PORT=45123
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - ./vector_db:/app/vector_db
    restart: always
    depends_on:
      postgres:
        condition: service_started

  postgres:
    image: postgres:15-alpine
    container_name: sutra_postgres
    environment:
      POSTGRES_USER: sutra_admin
      POSTGRES_PASSWORD: sutra_secure_password
      POSTGRES_DB: sutra_db
    ports:
      - "5432:5432"
    volumes:
      - sutra_pg_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  sutra_pg_data:
