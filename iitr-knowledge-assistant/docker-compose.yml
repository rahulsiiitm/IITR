
services:
  assistant:
    build:
      context: .
      dockerfile: docker/Dockerfile
    network_mode: "host"
    environment:
      - OLLAMA_URL=http://127.0.0.1:11434/api/chat
      - EMBEDDING_MODEL=BAAI/bge-base-en-v1.5
      - RERANK_MODEL=BAAI/bge-reranker-base
      - OLLAMA_MODEL=llama3.2
      - OLLAMA_NUM_PARALLEL=4
      - DATABASE_URL=${DATABASE_URL}
      - API_KEY=${API_KEY}
      - API_PORT=45123
    volumes:
      - ./data:/app/data
      - ./vector_db:/app/vector_db
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: always
    depends_on:
      postgres:
        condition: service_started

  postgres:
    image: postgres:15-alpine
    container_name: sutra_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - sutra_pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    network_mode: "host"
    command: tunnel --url http://127.0.0.1:45123
    restart: always
    depends_on:
      - assistant

volumes:
  sutra_pg_data:
