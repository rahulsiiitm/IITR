<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="IIT Roorkee PhD Admission Assistant">
  <title>IIT Roorkee PhD Admission Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <!-- Header -->
    <header class="header">
      <h1>IIT Roorkee PhD Admission Assistant</h1>
      <button class="clear-btn" id="clearBtn">Clear Chat</button>
    </header>

    <!-- Chat -->
    <main class="chat" id="chatArea">
      <div class="notice" id="welcomeMessage">Ask any question about PhD admissions, eligibility, fees, fellowships, or deadlines.</div>
    </main>

    <!-- Input -->
    <footer class="input-bar">
      <form id="inputForm">
        <input type="text" id="messageInput" placeholder="Type your question..." autocomplete="off">
        <button type="submit" id="sendBtn">Send</button>
      </form>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
