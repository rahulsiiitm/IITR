<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="IIT Roorkee PhD Admission Assistant">
  <title>IIT Roorkee PhD Admission Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-glow"></div>

  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="logo-area">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"/></svg>
        </div>
        <div>
          <h1>IIT Roorkee</h1>
          <p>PhD Admission Assistant</p>
        </div>
      </div>
      <button class="clear-btn" id="clearBtn" title="Clear conversation">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
        <span>Clear Chat</span>
      </button>
    </header>

    <!-- Chat -->
    <main class="chat" id="chatArea">
      <!-- Welcome Hero -->
      <div class="welcome-container" id="welcomeMessage">
        <div class="welcome-badge">AI Assistant</div>
        <h2>Welcome to PhD Admissions Portal</h2>
        <p>Ask anything about the eligibility criteria, GATE exemption rules, coursework requirements, candidacy milestones, or thesis submission details.</p>
        
        <div class="suggestions-grid">
          <button class="suggestion-card" data-question="How many departments does IIT Roorkee have?">
            <span class="card-icon">🏛️</span>
            <strong>Departments</strong>
            <span>Count of academic departments and centers</span>
          </button>
          <button class="suggestion-card" data-question="Do IIT graduates qualify for GATE exemption with CGPA 7.99?">
            <span class="card-icon">🎓</span>
            <strong>GATE Exemption</strong>
            <span>GATE exemption thresholds and comparisons</span>
          </button>
          <button class="suggestion-card" data-question="What coursework CGPA is required and what is thesis candidacy?">
            <span class="card-icon">📚</span>
            <strong>Coursework & Candidacy</strong>
            <span>Credit requirements and milestone approvals</span>
          </button>
          <button class="suggestion-card" data-question="What are the requirements for Ph.D. thesis submission?">
            <span class="card-icon">📝</span>
            <strong>Thesis Submission</strong>
            <span>Pre-synopsis seminar and timeline rules</span>
          </button>
        </div>
      </div>
    </main>

    <!-- Input -->
    <footer class="input-bar">
      <form id="inputForm">
        <input type="text" id="messageInput" placeholder="Ask a question about Ph.D. Regulations..." autocomplete="off">
        <button type="submit" id="sendBtn">
          <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </form>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
